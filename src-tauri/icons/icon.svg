<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232a37"/>
      <stop offset="1" stop-color="#0f131a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4fd2e8"/>
      <stop offset="1" stop-color="#2a93c4"/>
    </linearGradient>
  </defs>
  <!-- macOS-style rounded-square base -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <!-- usage ring: faint track + progress arc -->
  <g transform="rotate(-90 512 512)">
    <circle cx="512" cy="512" r="300" fill="none" stroke="#2b323f" stroke-width="116"/>
    <circle cx="512" cy="512" r="300" fill="none" stroke="url(#ring)" stroke-width="116"
            stroke-linecap="round" stroke-dasharray="1281 1885" pathLength="1885"/>
  </g>
  <circle cx="512" cy="512" r="64" fill="#4fd2e8"/>
</svg>
